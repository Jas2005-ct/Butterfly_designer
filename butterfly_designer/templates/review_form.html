{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Experience | Butterfly Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .star-rating input:checked ~ label { color: #8B5CF6; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: #A78BFA; }
    </style>
</head>
<body class="bg-[#FAF9F6] min-h-screen flex items-center justify-center p-6">
    
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-purple-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    </div>

    <div class="max-w-md w-full glass rounded-[2.5rem] p-10 shadow-2xl relative z-10">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-2xl mx-auto mb-6 shadow-lg">B</div>
            <h1 class="text-3xl font-serif mb-2">How did we do?</h1>
            <p class="text-slate-500 text-sm">Your feedback helps us maintain our standard of excellence.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Your Name</label>
                <input type="text" name="name" required placeholder="Enter your name" 
                    class="w-full px-6 py-4 rounded-2xl border border-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all bg-white/50">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Rating</label>
                <div class="flex flex-row-reverse justify-center space-x-2 space-x-reverse star-rating text-3xl text-slate-200">
                    <input type="radio" id="star5" name="rating" value="5" class="hidden" required /><label for="star5" class="cursor-pointer">★</label>
                    <input type="radio" id="star4" name="rating" value="4" class="hidden" /><label for="star4" class="cursor-pointer">★</label>
                    <input type="radio" id="star3" name="rating" value="3" class="hidden" /><label for="star3" class="cursor-pointer">★</label>
                    <input type="radio" id="star2" name="rating" value="2" class="hidden" /><label for="star2" class="cursor-pointer">★</label>
                    <input type="radio" id="star1" name="rating" value="1" class="hidden" /><label for="star1" class="cursor-pointer">★</label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Your Thoughts</label>
                <textarea name="review" rows="4" required placeholder="Tell us about your masterpiece..." 
                    class="w-full px-6 py-4 rounded-2xl border border-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all bg-white/50 resize-none"></textarea>
            </div>

            <button type="submit" 
                class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-indigo-600 transition-all transform hover:scale-[1.02] shadow-xl">
                SUBMIT REVIEW
            </button>
            
            <a href="{% url 'home' %}" class="block text-center text-sm text-slate-400 hover:text-indigo-600 transition-colors">
                Back to Home
            </a>
        </form>
    </div>
</body>
</html>
